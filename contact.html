<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">
    <title>Document</title>
</head>
<body>

    <header class="menu">
        <nav>
            <ul>
                <a href="portfolio.html">Portfolio</a>
                <a href="index.html">Home</a>
            </ul>
        </nav>
    </header>

    <h1 class="title-contact">Thanks for taking the time to reach out. 
        <br> 
        How can I help you today ?
    </h1>


    <main class="container-contact">
        <form class="form-contact" id="contact-form">
            <div class="input-form">
                <label for="firstname">Name</label>
                <input type="text" id="firstname" name="name">
            </div>
            <div class="input-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="input-form">
                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>
            </div>
            <button class="btn-form">
                <span>Send</span>
            </button>
        </form>
    </main>

<script src="contact.js"></script>
<script type="text/javascript"src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="text/javascript">      
    (function () {
    emailjs.init("403Z0LykCnUoSa-3Z");
    })();
</script>

<script>
// listen to the form submission
document
    .getElementById("contact-form")
    .addEventListener("submit", function (event) {
    event.preventDefault();

    const serviceID = "service_cluuob8";
    const templateID = "template_633sa48";

    // send the email here
    emailjs.sendForm(serviceID, templateID, this).then(
        (response) => {
        console.log("SUCCESS!", response.status, response.text);
        alert("Votre message a été bien envoyé");
        },
        (error) => {
        console.log("FAILED...", error);
        alert("Erreur", error);
        }
    );
    });
</script>
</body>
</html>
